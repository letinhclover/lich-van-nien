<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Không có kết nối — Lịch Vạn Niên AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: #FFFDF9;
      color: #1a0a08;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .card {
      max-width: 360px;
      width: 100%;
      background: white;
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      border: 1px solid #f0e8e4;
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; color: #1a0a08; }
    p { font-size: 0.875rem; color: #6b7280; line-height: 1.6; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block;
      background: #C0392B;
      color: white;
      font-weight: 700;
      font-size: 0.875rem;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .cached-link {
      display: block;
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #9ca3af;
      text-decoration: none;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #110805; color: #f5e6e0; }
      .card { background: #1a0a08; border-color: #2d1208; }
      h1 { color: #f5e6e0; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📵</div>
    <h1>Không có kết nối mạng</h1>
    <p>
      Đang hiển thị dữ liệu đã lưu. Một số tính năng AI sẽ không khả dụng
      khi không có internet.
    </p>
    <button class="btn" onclick="window.location.reload()">
      🔄 Thử lại
    </button>
    <a href="/" class="cached-link">← Về trang chủ (đã lưu cache)</a>
  </div>
</body>
</html>
